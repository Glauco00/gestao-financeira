version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/database.sqlite
      # É RECOMENDADO MUDAR O JWT_SECRET NO COOLIFY
      - JWT_SECRET=${JWT_SECRET:-super_secret_key_change_me_in_production}
    volumes:
      - gestao_data:/app/data
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - backend
    restart: always

volumes:
  gestao_data:
